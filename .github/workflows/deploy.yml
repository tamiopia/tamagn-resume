name: Deploy to cPanel Passenger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 18.3
        uses: actions/setup-node@v3
        with:
          node-version: '18.3'
          cache: 'npm'

      - name: Install passenger-seat
        run: npm install -g github:tamiopia/passenger-seat

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build
        env:
          CI: false

      - name: Build Passenger-Seat Bundle
        run: passenger-seat build

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./passenger-seat-dist/
          server-dir: /home/tebitain/resume.tamagn.tebitainnovations.com/
          dangerous-clean-slate: false
